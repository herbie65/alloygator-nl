name: Deploy to Firebase Hosting
on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create environment file
      run: |
        echo "NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBfTecdVHIYbwyI822bcKAhLWs0bNNT1yM" > .env.local
        echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=alloygator-nl.firebaseapp.com" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=alloygator-nl" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=alloygator-nl.firebasestorage.app" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=501404252412" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:501404252412:web:0dd2bd394f9a13117a3f79" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-QY0QVXYJ5H" >> .env.local
        echo "NODE_ENV=production" >> .env.local

    - name: Build project
      run: npm run build

    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALLOYGATOR_NL }}'
        channelId: live
        projectId: alloygator-nl
