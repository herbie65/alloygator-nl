name: Deploy to Firebase Hosting
on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Clean install
      run: |
        rm -f package-lock.json
        rm -f functions/package-lock.json
        rm -rf node_modules
        rm -rf functions/node_modules
        npm install
        cd functions && npm install && cd ..
      
    - name: Create environment file
      run: |
        echo "NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBfTecdVHIYbwyI822bcKAhLWs0bNNT1yM" > .env.local
        echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=alloygator-nl.firebaseapp.com" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=alloygator-nl" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=alloygator-nl.appspot.com" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123456789" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:123456789:web:abcdef123456" >> .env.local
        echo "NODE_ENV=production" >> .env.local
        
    - name: Build project
      run: npm run build
      
    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        channelId: live
        projectId: alloygator-nl
